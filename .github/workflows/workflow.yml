name: workflow.yml
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Phase
    runs-on: ubuntu-latest

    steps:
      - name: Load source code
        uses: action/checkout@v4

      - name: Setup java
        uses: action/setup-java@v4
        with:
          java-version: '17'
          distributed: 'temurin'
          cache: 'maven'

      - name: Build with Maven (Skip Tests)
        run: mvn clean package -DskipTests

      - name: Upload Target Folder as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-target
          path: target/
          retention-days: 1

  test:
    name: Test Phase
    needs: build # QUAN TRỌNG: Lệnh này yêu cầu job 'test' phải đợi job 'build' thành công mới được chạy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download Target Artifact
        # Tải lại thư mục 'target' từ phase Build xuống máy ảo của phase Test
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-target
          path: target/

      - name: Run Tests with Maven
        run: mvn test
