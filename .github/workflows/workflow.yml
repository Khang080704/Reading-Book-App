name: workflow.yml
on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Phase
    runs-on: ubuntu-latest

    steps:
      - name: Load source code
        uses: actions/checkout@v4

      - name: Setup java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven (Skip Tests)
        run: mvn clean package -DskipTests

      - name: Upload Target Folder as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-target
          path: target/
          retention-days: 1

  test:
    name: Test Phase
    needs: build # QUAN TRỌNG: Lệnh này yêu cầu job 'test' phải đợi job 'build' thành công mới được chạy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Download Target Artifact
        # Tải lại thư mục 'target' từ phase Build xuống máy ảo của phase Test
        uses: actions/download-artifact@v4
        with:
          name: spring-boot-target
          path: target/

      - name: Run Tests with Maven
        run: mvn test

  deploy:
    name: Deploy Phase
    needs: test
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout Source Code
        uses: actions/checkout@v4
      
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
        
      - name: Build and Push Docker Image
        run: |
          # Build image, tag theo tên registry
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/my-app:latest .
          # Push lên ACR
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/my-app:latest
      
      
      - name: Trigger Azure Web App Restart
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'tên-web-app-của-bạn'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ secrets.ACR_LOGIN_SERVER }}/my-app:latest