services:

  postgres:
    image: postgres:15
    container_name: book-store
    ports:
      - "5432:5432"
    env_file:
      - ./.env
    environment:
      POSTGRES_USER: khang
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: store
    volumes:
      - postgres-data:/var/lib/postgresql/data
volumes:
  postgres-data: